<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>STREET FIGHT — 聖域の番人</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#07080d; touch-action:none;
    font-family:'Courier New',monospace; user-select:none; -webkit-user-select:none; }
  #wrap { position:fixed; inset:0; }
  canvas { display:block; width:100%; height:100%; }
  .pad { position:fixed; bottom:12px; display:flex; gap:10px; z-index:5; }
  #padL { left:12px; }
  #padR { right:12px; flex-wrap:wrap; width:196px; justify-content:flex-end; }
  .btn { width:56px; height:56px; border-radius:50%; border:2px solid rgba(255,255,255,.28);
    background:rgba(255,255,255,.08); color:rgba(255,255,255,.85); font-weight:bold;
    font-size:11px; display:flex; align-items:center; justify-content:center; flex-direction:column;
    backdrop-filter:blur(2px); }
  .btn:active, .btn.on { background:rgba(255,210,80,.35); border-color:rgba(255,210,80,.8); }
  .btn small { font-size:9px; opacity:.7; }
  .btn.atk { border-color:rgba(255,90,90,.4); }
  .btn.grd { border-color:rgba(90,170,255,.5); }
  .btn.sp  { border-color:rgba(255,210,80,.7); color:#ffd45e; }
  #hint { position:fixed; top:64px; width:100%; text-align:center; color:rgba(255,255,255,.45);
    font-size:11px; z-index:4; pointer-events:none; transition:opacity 1s; }
  /* キャラ選択 */
  #select { position:fixed; inset:0; z-index:20; background:
    radial-gradient(circle at 50% 30%, #1a2033 0%, #0a0c14 70%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:14px; }
  #select h1 { color:#fff; letter-spacing:4px; font-size:clamp(20px,5vw,34px);
    text-shadow:0 0 18px rgba(120,170,255,.6); }
  #select p.sub { color:rgba(255,255,255,.55); font-size:12px; margin-top:-8px; }
  #select p.story { color:rgba(255,225,170,.75); font-size:11.5px; line-height:1.7; text-align:center; }
  #cards { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; max-width:720px; }
  .card { width:140px; border:2px solid rgba(255,255,255,.2); border-radius:8px;
    background:rgba(255,255,255,.05); padding:10px 8px 12px; text-align:center; cursor:pointer;
    transition:transform .12s, border-color .12s; }
  .card:hover, .card:active { transform:translateY(-4px); border-color:#ffd45e; }
  .card canvas { width:96px; height:110px; }
  .card .nm { color:#fff; font-size:14px; font-weight:bold; margin-top:4px; }
  .card .st { color:#8fb8ff; font-size:11px; }
  .card .sp { color:#ffd45e; font-size:10px; margin-top:3px; }
  @media (max-width:640px) { .card { width:118px; } .card canvas { width:80px; height:92px; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="hint" style="opacity:0"></div>

<div id="select">
  <h1>STREET FIGHT</h1>
  <p class="sub">— 聖域の番人 —</p>
  <p class="story">夜ごと、地下シェルターを狙う襲撃者が現れる。<br>
  仲間が眠る聖域を守れるのは、キミの拳だけだ。<br>
  ゲート前 → 洞窟区画 → 聖域の扉、3つの戦場を守り抜け。</p>
  <div id="cards"></div>
</div>

<div class="pad" id="padL" style="display:none">
  <button class="btn" data-k="left">◀</button>
  <button class="btn" data-k="right">▶</button>
  <button class="btn grd" data-k="block">🛡<small>ガード</small></button>
</div>
<div class="pad" id="padR" style="display:none">
  <button class="btn atk" data-k="jab">👊<small>ジャブ</small></button>
  <button class="btn atk" data-k="cross">💥<small>ストレート</small></button>
  <button class="btn atk" data-k="hook">🌀<small>フック</small></button>
  <button class="btn atk" data-k="lowkick">🦵<small>ロー</small></button>
  <button class="btn atk" data-k="highkick">⚡<small>ハイ</small></button>
  <button class="btn sp" data-k="special" id="spBtn">★<small>必殺</small></button>
</div>

<script>
/* ============================================================
   STREET FIGHT — realistic 1v1 back-alley brawler
   Core module: runs in browser AND headless Node (for testing).
   All canvas-geometry values pass through fin() so that
   createLinearGradient etc. can never receive non-finite numbers.
   ============================================================ */
(function (root, factory) {
  if (typeof module !== 'undefined' && module.exports) module.exports = factory();
  else root.StreetFight = factory();
})(typeof self !== 'undefined' ? self : this, function () {
  'use strict';

  // ---------- numeric safety ----------
  function fin(v, d) { return (typeof v === 'number' && isFinite(v)) ? v : (d || 0); }
  function clamp(v, a, b) { v = fin(v, a); return v < a ? a : (v > b ? b : v); }
  function lerp(a, b, t) { return fin(a) + (fin(b) - fin(a)) * clamp(t, 0, 1); }
  function ease(t) { t = clamp(t, 0, 1); return t * t * (3 - 2 * t); }
  function easeOut(t) { t = clamp(t, 0, 1); return 1 - (1 - t) * (1 - t); }

  // safe gradient helpers — the fix for the reported crash
  function linGrad(ctx, x0, y0, x1, y1) {
    return ctx.createLinearGradient(fin(x0), fin(y0), fin(x1), fin(y1));
  }
  function radGrad(ctx, x0, y0, r0, x1, y1, r1) {
    return ctx.createRadialGradient(fin(x0), fin(y0), Math.max(0, fin(r0)),
                                    fin(x1), fin(y1), Math.max(0, fin(r1)));
  }

  var rndSeed = 12345;
  function rnd() { rndSeed = (rndSeed * 1103515245 + 12345) & 0x7fffffff; return rndSeed / 0x7fffffff; }
  function setSeed(s) { rndSeed = fin(s, 12345) | 0 || 12345; }

  // ---------- attacks ----------
  // frames at 60fps: windup / active / recover
  var ATTACKS = {
    jab:   { windup: 5,  active: 4, recover: 8,  dmg: 5,  stun: 14, stam: 6,  reach: 78,  knock: 60,  high: true,  arm: true,  sound: 'jab'  },
    cross: { windup: 9,  active: 5, recover: 14, dmg: 10, stun: 22, stam: 12, reach: 88,  knock: 150, high: true,  arm: true,  sound: 'hit'  },
    hook:  { windup: 12, active: 5, recover: 16, dmg: 14, stun: 26, stam: 16, reach: 70,  knock: 200, high: true,  arm: true,  sound: 'hit'  },
    lowkick:{windup: 11, active: 5, recover: 18, dmg: 12, stun: 20, stam: 15, reach: 95,  knock: 90,  high: false, arm: false, sound: 'kick' },
    highkick:{windup:16, active: 6, recover: 22, dmg: 20, stun: 34, stam: 24, reach: 105, knock: 320, high: true,  arm: false, sound: 'kick' },
    // 必殺技（キャラ固有）
    wave:   { windup: 15, active: 4,  recover: 24, dmg: 0,  stun: 0,  stam: 30, reach: 0,   knock: 0,   high: true, arm: true,  sound: 'swing', projectile: true },
    flurry: { windup: 8,  active: 26, recover: 18, dmg: 6,  stun: 16, stam: 26, reach: 92,  knock: 80,  high: true, arm: false, sound: 'kick',  multi: 3, gap: 8 },
    dash:   { windup: 10, active: 10, recover: 22, dmg: 16, stun: 28, stam: 28, reach: 72,  knock: 260, high: true, arm: true,  sound: 'hit',   drive: 430 },
    lariat: { windup: 12, active: 18, recover: 26, dmg: 18, stun: 30, stam: 34, reach: 64,  knock: 310, high: true, arm: true,  sound: 'hit',   around: true }
  };
  var SPECIALS = ['wave', 'flurry', 'dash', 'lariat'];

  // ---------- オリジナルファイター4人（アーキタイプから独自デザイン） ----------
  var STYLES = {
    takeru: { name: 'タケル',     sub: '空手',       skin: '#c98d63', top: '#26324e', pants: '#26324e', hair: '#17130f', band: '#3a7bd5', outfit: 'gi',       scale: 1.00, speed: 1.00, power: 1.00, special: 'wave',   specialName: '烈気掌' },
    meifa:  { name: 'メイファ',   sub: '拳法',       skin: '#d8a276', top: '#1f6e4a', pants: '#143d2a', hair: '#241a12', band: null,      outfit: 'kungfu',   scale: 0.94, speed: 1.18, power: 0.88, special: 'flurry', specialName: '旋風連脚' },
    bird:   { name: 'バード大尉', sub: '軍隊格闘',   skin: '#b57b4e', top: '#4a4f3a', pants: '#3a4032', hair: '#d8c07a', band: null,      outfit: 'tank',     scale: 1.05, speed: 1.00, power: 1.10, special: 'dash',   specialName: '弾丸ブロー' },
    gordo:  { name: 'ゴルドー',   sub: 'レスリング', skin: '#c08a5f', top: '#7a2a86', pants: '#7a2a86', hair: '#3a2a1a', band: null,      outfit: 'wrestler', scale: 1.16, speed: 0.82, power: 1.28, special: 'lariat', specialName: '豪腕ハリケーン' }
  };
  var STYLE_KEYS = ['takeru', 'meifa', 'bird', 'gordo'];
  var COMBO_WINDOW = 40; // frames after recover during which next attack chains faster

  // ---------- fighter ----------
  function Fighter(opts) {
    this.name = opts.name;
    var st = STYLES[opts.style] || STYLES.takeru;
    this.style = opts.style || 'takeru';
    this.dispName = st.name; this.sub = st.sub;
    this.outfit = st.outfit; this.band = st.band;
    this.scale = st.scale; this.speed = st.speed; this.power = st.power;
    this.special = st.special; this.specialName = st.specialName;
    this.x = fin(opts.x, 0);
    this.facing = opts.facing || 1;      // 1 = right, -1 = left
    this.vx = 0;
    this.hp = 100; this.maxHp = 100;
    this.stam = 100; this.maxStam = 100;
    this.state = 'idle';                 // idle|walk|attack|hit|block|down|getup|ko|win
    this.attack = null;                  // current attack key
    this.t = 0;                          // frames in current state
    this.hitT = 0;                       // remaining hitstun frames
    this.blockHeld = false;
    this.downT = 0;
    this.combo = 0;
    this.comboT = 0;
    this.hurtFlash = 0;
    this.breath = rnd() * 6.28;
    this.skin = st.skin; this.shirt = st.top; this.pants = st.pants; this.hair = st.hair;
    this.ai = !!opts.ai;
    this.aiTimer = 0; this.aiMove = 0;
    this.hitLanded = false;              // one hit per active window
    this.hitCount = 0; this.nextHitT = 0; // 連撃用
    this.projFired = false;              // 飛び道具は1発
    this.bruise = 0;                     // visual damage accumulation 0..1
    this.stagger = 0;                    // lateral wobble from fatigue/hits
  }
  Fighter.prototype.busy = function () {
    return this.state === 'attack' || this.state === 'hit' || this.state === 'down' ||
           this.state === 'getup' || this.state === 'ko';
  };

  // ---------- particles ----------
  function Particles() { this.list = []; }
  Particles.prototype.spawn = function (x, y, kind, n, dir) {
    for (var i = 0; i < n; i++) {
      var a = rnd() * 6.28, sp = 40 + rnd() * (kind === 'blood' ? 260 : 160);
      this.list.push({
        x: fin(x), y: fin(y),
        vx: Math.cos(a) * sp * 0.4 + fin(dir, 0) * (60 + rnd() * 120),
        vy: -Math.abs(Math.sin(a)) * sp - 40,
        life: 0.35 + rnd() * (kind === 'blood' ? 0.5 : 0.3),
        t: 0, kind: kind, r: kind === 'dust' ? 3 + rnd() * 5 : 1.2 + rnd() * 2.2
      });
      if (this.list.length > 220) this.list.shift();
    }
  };
  Particles.prototype.update = function (dt, groundY) {
    for (var i = this.list.length - 1; i >= 0; i--) {
      var p = this.list[i];
      p.t += dt;
      p.vy += (p.kind === 'dust' ? 60 : 900) * dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      if (p.y > groundY) { p.y = groundY; p.vy *= -0.25; p.vx *= 0.6; }
      if (p.t > p.life) this.list.splice(i, 1);
    }
  };

  // ---------- game ----------
  function Game(opts) {
    opts = opts || {};
    this.W = fin(opts.width, 800); this.H = fin(opts.height, 450);
    this.groundY = this.H * 0.82;
    this.p1 = new Fighter({ name: 'YOU', x: this.W * 0.35, facing: 1,
      style: opts.p1Style || 'takeru' });
    this.p2 = new Fighter({ name: 'RIVAL', x: this.W * 0.65, facing: -1, ai: true,
      style: opts.p2Style || 'gordo' });
    this.projectiles = [];
    this.particles = new Particles();
    this.shake = 0; this.hitStop = 0;
    this.round = 1; this.wins1 = 0; this.wins2 = 0;
    this.stageNames = ['シェルターゲート前', '地下シェルター・洞窟区画', '聖域の扉'];
    this.phase = 'intro';                // intro|fight|ko|roundend|matchend
    this.phaseT = 0;
    this.timer = 60;
    this.frame = 0;
    this.events = [];                    // for sound hooks + tests
    this.msg = 'ROUND 1'; this.msgT = 1.4;
    this.msgSub = '第1戦 ' + this.stageNames[0];
    this.rain = [];
    for (var i = 0; i < 70; i++) this.rain.push({ x: rnd(), y: rnd(), s: 0.6 + rnd() * 0.8 });
  }

  Game.prototype.resize = function (w, h) {
    var ow = this.W || 1;
    this.W = Math.max(80, fin(w, 800)); this.H = Math.max(60, fin(h, 450));
    this.groundY = this.H * 0.82;
    var k = this.W / ow;
    this.p1.x = clamp(this.p1.x * k, 40, this.W - 40);
    this.p2.x = clamp(this.p2.x * k, 40, this.W - 40);
  };

  Game.prototype.emit = function (name, data) { this.events.push({ name: name, data: data || {} }); if (this.events.length > 60) this.events.shift(); };
  Game.prototype.drainEvents = function () { var e = this.events; this.events = []; return e; };

  // input: {left,right,block,jab,cross,hook,lowkick,highkick}
  Game.prototype.update = function (dt, input) {
    dt = clamp(fin(dt, 0.016), 0, 0.05);
    input = input || {};
    this.frame++;
    this.phaseT += dt;
    if (this.msgT > 0) this.msgT -= dt;
    if (this.shake > 0) this.shake = Math.max(0, this.shake - dt * 26);
    this.particles.update(dt, this.groundY + 6);
    for (var i = 0; i < this.rain.length; i++) {
      var r = this.rain[i]; r.y += dt * 0.9 * r.s; r.x += dt * 0.05;
      if (r.y > 1) { r.y -= 1; r.x = rnd(); }
      if (r.x > 1) r.x -= 1;
    }

    if (this.hitStop > 0) { this.hitStop -= dt; return; }

    if (this.phase === 'intro') {
      if (this.phaseT > 1.5) { this.phase = 'fight'; this.msg = 'FIGHT!'; this.msgT = 0.9; this.emit('bell'); }
      this.updateFighterPassive(this.p1, dt); this.updateFighterPassive(this.p2, dt);
      return;
    }
    if (this.phase === 'fight') {
      this.timer = Math.max(0, this.timer - dt);
      var aiInput = this.aiThink(this.p2, this.p1, dt);
      this.updateFighter(this.p1, this.p2, dt, input);
      this.updateFighter(this.p2, this.p1, dt, aiInput);
      this.updateProjectiles(dt);
      this.collidePush();
      if (this.p1.hp <= 0 || this.p2.hp <= 0) {
        this.phase = 'ko'; this.phaseT = 0; this.msg = 'K.O.'; this.msgT = 2;
        this.shake = 1.4; this.emit('ko');
        var loser = this.p1.hp <= 0 ? this.p1 : this.p2;
        var winner = loser === this.p1 ? this.p2 : this.p1;
        loser.state = 'ko'; loser.t = 0;
        winner.state = winner.state === 'attack' ? winner.state : 'win'; winner.t = 0;
        if (winner === this.p1) this.wins1++; else this.wins2++;
      } else if (this.timer <= 0) {
        this.phase = 'ko'; this.phaseT = 0; this.msg = 'TIME UP'; this.msgT = 2;
        if (this.p1.hp >= this.p2.hp) this.wins1++; else this.wins2++;
        this.emit('bell');
      }
      return;
    }
    if (this.phase === 'ko') {
      this.updateFighterPassive(this.p1, dt); this.updateFighterPassive(this.p2, dt);
      if (this.phaseT > 2.6) {
        if (this.wins1 >= 2 || this.wins2 >= 2) {
          this.phase = 'matchend'; this.phaseT = 0;
          this.msg = (this.wins1 >= 2 ? '聖域は守られた！' : 'シェルターが破られた…'); this.msgT = 9999;
          this.msgSub = (this.wins1 >= 2 ? '夜明けだ。仲間たちが眠る地下は今日も無事だ' : '装甲壁の向こうで、警報が鳴り響く');
        } else {
          this.round++; this.startRound();
        }
      }
      return;
    }
    if (this.phase === 'matchend') {
      this.updateFighterPassive(this.p1, dt); this.updateFighterPassive(this.p2, dt);
      if (input.jab || input.cross) this.restart();
    }
  };

  Game.prototype.restart = function () {
    this.wins1 = 0; this.wins2 = 0; this.round = 1; this.startRound();
  };

  Game.prototype.startRound = function () {
    this.phase = 'intro'; this.phaseT = 0; this.timer = 60;
    this.msg = 'ROUND ' + this.round; this.msgT = 1.4;
    var si = Math.min(this.round, 3) - 1;
    this.msgSub = '第' + this.round + '戦 ' + this.stageNames[si]
      + (this.round > 1 ? ' — 造水機の水と栽培棚の食料で回復した' : '');
    var g = this;
    [this.p1, this.p2].forEach(function (f, i) {
      f.hp = f.maxHp; f.stam = f.maxStam; f.state = 'idle'; f.attack = null;
      f.t = 0; f.hitT = 0; f.combo = 0; f.vx = 0; f.bruise = Math.min(0.6, f.bruise);
      f.x = g.W * (i === 0 ? 0.35 : 0.65); f.facing = i === 0 ? 1 : -1;
    });
    this.particles.list.length = 0;
    this.projectiles.length = 0;
  };

  // ---------- 飛び道具 ----------
  Game.prototype.updateProjectiles = function (dt) {
    for (var i = this.projectiles.length - 1; i >= 0; i--) {
      var p = this.projectiles[i];
      p.x = fin(p.x + p.vx * dt); p.t += dt; p.pulse += dt * 14;
      var tgt = p.owner === this.p1 ? this.p2 : this.p1;
      var hitY = this.groundY - 100;
      if (Math.abs(fin(tgt.x) - p.x) < 32 && tgt.state !== 'down' && tgt.state !== 'getup' && tgt.state !== 'ko') {
        var blocked = tgt.state === 'block' && tgt.facing === (p.vx > 0 ? -1 : 1);
        if (blocked) {
          var chip = 2;
          tgt.hp = clamp(tgt.hp - chip, 0, tgt.maxHp);
          tgt.stam = clamp(tgt.stam - 10, 0, tgt.maxStam);
          this.particles.spawn(p.x, hitY, 'spark', 6, p.vx > 0 ? 1 : -1);
          this.emit('block', {});
        } else {
          var dmg = 13 * (p.owner.power || 1);
          tgt.hp = clamp(tgt.hp - dmg, 0, tgt.maxHp);
          tgt.hurtFlash = 1;
          tgt.state = 'hit'; tgt.hitT = 24; tgt.t = 0;
          tgt.vx = (p.vx > 0 ? 1 : -1) * 200;
          this.particles.spawn(p.x, hitY, 'sweat', 7, p.vx > 0 ? 1 : -1);
          this.shake = Math.max(this.shake, 0.5);
          this.hitStop = 0.05;
          this.emit('hit', { dmg: dmg, heavy: false });
        }
        this.projectiles.splice(i, 1);
        continue;
      }
      if (p.t > 1.6 || p.x < -40 || p.x > this.W + 40) this.projectiles.splice(i, 1);
    }
  };

  Game.prototype.updateFighterPassive = function (f, dt) {
    f.breath += dt * 2.2;
    f.t += dt * 60;
    if (f.hurtFlash > 0) f.hurtFlash -= dt * 4;
    f.vx *= Math.pow(0.001, dt);
    f.x = clamp(f.x + f.vx * dt, 40, this.W - 40);
  };

  Game.prototype.updateFighter = function (f, foe, dt, inp) {
    var frames = dt * 60;
    f.breath += dt * (2.2 + (1 - f.stam / f.maxStam) * 4);
    if (f.hurtFlash > 0) f.hurtFlash -= dt * 4;
    if (f.stagger > 0) f.stagger = Math.max(0, f.stagger - dt * 2);
    if (f.comboT > 0) f.comboT -= frames; else f.combo = 0;

    // face the opponent unless mid-action
    if (!f.busy()) f.facing = foe.x >= f.x ? 1 : -1;

    // stamina regen (slower while blocking)
    var regen = f.state === 'block' ? 4 : (f.state === 'idle' ? 14 : 9);
    f.stam = clamp(f.stam + regen * dt, 0, f.maxStam);

    // hitstun countdown
    if (f.state === 'hit') {
      f.hitT -= frames;
      f.x = clamp(f.x + f.vx * dt, 40, this.W - 40);
      f.vx *= Math.pow(0.002, dt);
      if (f.hitT <= 0) { f.state = 'idle'; f.t = 0; }
      return;
    }
    if (f.state === 'down') {
      f.t += frames; f.vx *= Math.pow(0.002, dt);
      f.x = clamp(f.x + f.vx * dt, 40, this.W - 40);
      if (f.t > 70 && f.hp > 0) { f.state = 'getup'; f.t = 0; }
      return;
    }
    if (f.state === 'getup') {
      f.t += frames;
      if (f.t > 40) { f.state = 'idle'; f.t = 0; }
      return;
    }
    if (f.state === 'ko' || f.state === 'win') { f.t += frames; return; }

    // attacking
    if (f.state === 'attack') {
      var atk = ATTACKS[f.attack];
      f.t += frames;
      var total = atk.windup + atk.active + atk.recover;
      // forward drive (必殺の突進は速い)
      var drive = fin(atk.drive, 90);
      if (f.t < atk.windup + atk.active) f.x = clamp(f.x + f.facing * drive * dt, 40, this.W - 40);
      // 飛び道具: 溜め完了の瞬間に1発
      if (atk.projectile && !f.projFired && f.t >= atk.windup) {
        f.projFired = true;
        this.projectiles.push({
          x: f.x + f.facing * 34, vx: f.facing * 340,
          owner: f, t: 0, pulse: 0
        });
        this.emit('wave', { who: f.name });
      }
      // active window hit test（multi対応: 連撃は複数回当たる）
      var canHit = atk.multi ? (f.hitCount < atk.multi && f.t >= f.nextHitT) : !f.hitLanded;
      if (!atk.projectile && canHit && f.t >= atk.windup && f.t <= atk.windup + atk.active) {
        var tip = f.x + f.facing * (atk.reach * (0.85 + 0.15 * Math.sin(f.t)));
        var dist = Math.abs(tip - foe.x);
        var behindOK = atk.around && Math.abs(f.x - foe.x) < atk.reach + 20; // 回転攻撃は背後も
        var inRange = behindOK || dist < 34 || ((tip - foe.x) * f.facing > -10 && Math.abs(f.x - foe.x) < atk.reach + 26);
        if (inRange && foe.state !== 'down' && foe.state !== 'getup' && foe.state !== 'ko') {
          f.hitLanded = true;
          f.hitCount++; f.nextHitT = f.t + fin(atk.gap, 999);
          this.resolveHit(f, foe, atk);
        }
      }
      if (f.t >= total) {
        f.state = 'idle'; f.t = 0; f.attack = null;
        f.comboT = COMBO_WINDOW;
      }
      return;
    }

    // --- controllable states ---
    var wantBlock = !!inp.block;
    var move = (inp.right ? 1 : 0) - (inp.left ? 1 : 0);

    // start attack?
    var chosen = null;
    if (!wantBlock) {
      if (inp.jab) chosen = 'jab';
      else if (inp.cross) chosen = 'cross';
      else if (inp.hook) chosen = 'hook';
      else if (inp.lowkick) chosen = 'lowkick';
      else if (inp.highkick) chosen = 'highkick';
      else if (inp.special) chosen = f.special;   // キャラ固有必殺技
    }
    if (chosen && f.stam >= ATTACKS[chosen].stam * 0.6) {
      f.state = 'attack'; f.attack = chosen; f.hitLanded = false;
      f.hitCount = 0; f.nextHitT = 0; f.projFired = false;
      // chaining: skip part of windup inside combo window
      f.t = (f.comboT > 0 && f.combo > 0) ? ATTACKS[chosen].windup * 0.35 : 0;
      f.stam = clamp(f.stam - ATTACKS[chosen].stam, 0, f.maxStam);
      this.emit(SPECIALS.indexOf(chosen) >= 0 ? 'special' : 'swing', { who: f.name, atk: chosen });
      return;
    }

    if (wantBlock) { f.state = 'block'; f.t += frames; f.vx = 0; return; }

    if (move !== 0) {
      f.state = 'walk'; f.t += frames;
      var speed = 150 * f.speed * (0.55 + 0.45 * (f.stam / f.maxStam));
      // walking backwards is slower
      if (move !== f.facing) speed *= 0.72;
      f.x = clamp(f.x + move * speed * dt, 40, this.W - 40);
    } else {
      f.state = 'idle'; f.t += frames;
    }
  };

  Game.prototype.resolveHit = function (att, def, atk) {
    var blocked = def.state === 'block' && def.facing === -att.facing;
    var dir = att.facing;
    var hitX = def.x - dir * 12;
    var hitY = this.groundY - (atk.high ? 118 : 46);
    if (blocked) {
      var chip = Math.max(1, Math.round(atk.dmg * 0.12));
      def.hp = clamp(def.hp - chip, 0, def.maxHp);
      def.stam = clamp(def.stam - atk.dmg * 0.9, 0, def.maxStam);
      def.vx = dir * atk.knock * 0.5;
      this.particles.spawn(hitX, hitY, 'spark', 5, dir);
      this.emit('block', { atk: atk });
      this.shake = Math.max(this.shake, 0.25);
      this.hitStop = 0.03;
      // guard crush
      if (def.stam <= 0) { def.state = 'hit'; def.hitT = 30; this.emit('guardbreak'); }
      return;
    }
    var dmg = atk.dmg * (att.power || 1) * (0.9 + rnd() * 0.25) * (1 + att.combo * 0.06);
    def.hp = clamp(def.hp - dmg, 0, def.maxHp);
    def.hurtFlash = 1;
    def.bruise = clamp(def.bruise + dmg / 220, 0, 1);
    def.vx = dir * atk.knock;
    def.stagger = 1;
    att.combo++; att.comboT = COMBO_WINDOW + atk.recover;
    var heavy = atk.dmg >= 14 || def.hp <= 0;
    this.particles.spawn(hitX, hitY, 'sweat', heavy ? 8 : 5, dir);
    if (heavy) this.particles.spawn(hitX, hitY - 4, 'blood', 6, dir);
    this.particles.spawn(def.x - dir * 6, this.groundY, 'dust', 3, dir);
    this.shake = Math.max(this.shake, heavy ? 0.9 : 0.45);
    this.hitStop = heavy ? 0.09 : 0.045;
    this.emit(atk.sound, { dmg: dmg, heavy: heavy });
    if (def.hp <= 0 || (heavy && atk.knock >= 300)) {
      def.state = 'down'; def.t = 0; def.vx = dir * atk.knock * 1.4;
      this.particles.spawn(def.x, this.groundY, 'dust', 10, dir);
      this.emit('fall');
    } else {
      def.state = 'hit'; def.hitT = atk.stun; def.t = 0;
    }
  };

  Game.prototype.collidePush = function () {
    var a = this.p1, b = this.p2;
    var d = b.x - a.x, min = 44;
    if (Math.abs(d) < min && a.state !== 'down' && b.state !== 'down') {
      var push = (min - Math.abs(d)) / 2 * (d >= 0 ? 1 : -1);
      a.x = clamp(a.x - push, 40, this.W - 40);
      b.x = clamp(b.x + push, 40, this.W - 40);
    }
  };

  // ---------- AI ----------
  Game.prototype.aiThink = function (me, foe, dt) {
    var inp = {};
    me.aiTimer -= dt;
    var dist = Math.abs(foe.x - me.x);
    var toFoe = foe.x > me.x ? 1 : -1;
    // react to incoming attack
    if (foe.state === 'attack' && dist < 130) {
      var atk = ATTACKS[foe.attack];
      if (foe.t < atk.windup && rnd() < 0.55 && me.stam > 20) { inp.block = true; return inp; }
    }
    if (me.aiTimer <= 0) {
      me.aiTimer = 0.12 + rnd() * 0.3;
      var r = rnd();
      if (me.stam < 22) me.aiMove = r < 0.6 ? -toFoe : 0;                 // tired: back off
      else if (dist > 110) me.aiMove = r < 0.85 ? toFoe : 0;               // approach
      else if (dist < 55 && r < 0.25) me.aiMove = -toFoe;                  // create space
      else me.aiMove = 0;
      // attack choice in range
      if (me.stam > 34 && !me.busy() && rnd() < 0.14) {
        // 必殺技: キャラごとに得意な間合いで
        var sp = me.special;
        if ((sp === 'wave' && dist > 200) ||
            (sp === 'dash' && dist > 140 && dist < 320) ||
            (sp === 'flurry' && dist < 100) ||
            (sp === 'lariat' && dist < 80)) { inp.special = true; return inp; }
      }
      if (dist < 105 && me.stam > 18 && !me.busy() && rnd() < 0.62) {
        var pick = rnd();
        if (dist > 88) inp[pick < 0.6 ? 'lowkick' : 'highkick'] = true;
        else if (pick < 0.4) inp.jab = true;
        else if (pick < 0.7) inp.cross = true;
        else if (pick < 0.9) inp.hook = true;
        else inp.highkick = true;
      }
    }
    if (me.aiMove === 1) inp.right = true;
    if (me.aiMove === -1) inp.left = true;
    return inp;
  };

  /* ============================================================
     RENDERING
     ============================================================ */
  Game.prototype.render = function (ctx) {
    var W = fin(this.W, 800), H = fin(this.H, 450), g = this.groundY;
    ctx.save();
    // camera shake
    var sh = fin(this.shake, 0);
    if (sh > 0) ctx.translate((rnd() - 0.5) * sh * 14, (rnd() - 0.5) * sh * 10);

    // --- ステージ背景（ラウンドに応じてシェルターの奥へ） ---
    var stage = Math.min(fin(this.round, 1), 3);
    if (stage === 1) this.bgGate(ctx, W, H, g);
    else if (stage === 2) this.bgCave(ctx, W, H, g);
    else this.bgVault(ctx, W, H, g);

    // fighters: shadows first
    this.shadow(ctx, this.p1); this.shadow(ctx, this.p2);
    // draw farther-back fighter first
    var order = this.p1.x <= this.p2.x ? [this.p2, this.p1] : [this.p1, this.p2];
    this.drawFighter(ctx, order[0]); this.drawFighter(ctx, order[1]);

    // 気弾（飛び道具）
    this.drawProjs(ctx);

    // particles
    this.drawParticles(ctx);

    // HUD
    this.hud(ctx, W, H);
    ctx.restore();
  };

  // ========== シェルター・ステージ背景 ==========
  // 第1戦: 白い都市のシェルターゲート前（夕暮れ・小雨）
  Game.prototype.bgGate = function (ctx, W, H, g) {
    var sky = linGrad(ctx, 0, 0, 0, g);
    sky.addColorStop(0, '#2a2a55'); sky.addColorStop(0.55, '#7a4a5a'); sky.addColorStop(1, '#c9744a');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, g);
    // 白亜のビル群（窓ガラスに夕陽）
    var bw = W / 6;
    for (var i = 0; i < 7; i++) {
      var h = (0.3 + ((i * 41) % 25) / 62) * g;
      ctx.fillStyle = 'rgba(230,226,214,0.9)';
      ctx.fillRect(i * bw - 6, g - h, bw - 10, h);
      for (var wy = 0; wy < 5; wy++) for (var wx = 0; wx < 3; wx++) {
        ctx.fillStyle = ((i + wx + wy) % 3 === 0) ? 'rgba(255,190,120,0.7)' : 'rgba(120,170,200,0.55)';
        ctx.fillRect(i * bw + 4 + wx * (bw - 26) / 3, g - h + 10 + wy * (h - 20) / 5, 8, 10);
      }
    }
    // 聖域ゲート（装甲壁＋黄色いハッチ灯）
    ctx.fillStyle = '#b8bcc4'; ctx.fillRect(W * 0.38, g - H * 0.28, W * 0.24, H * 0.28);
    ctx.fillStyle = '#8a8e98';
    ctx.fillRect(W * 0.38, g - H * 0.28, W * 0.24, 5);
    ctx.fillRect(W * 0.5 - 2, g - H * 0.28, 4, H * 0.28);
    ctx.fillStyle = '#5a5e66'; ctx.fillRect(W * 0.44, g - H * 0.19, W * 0.12, H * 0.19);
    var hatch = radGrad(ctx, W * 0.5, g - H * 0.1, 2, W * 0.5, g - H * 0.1, 34);
    hatch.addColorStop(0, 'rgba(255,212,94,0.8)'); hatch.addColorStop(1, 'rgba(255,212,94,0)');
    ctx.fillStyle = hatch; ctx.beginPath(); ctx.arc(W * 0.5, g - H * 0.1, 34, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#ffd45e'; ctx.fillRect(W * 0.5 - 9, g - H * 0.1 - 4, 18, 8);
    // 街灯
    this.lamp(ctx, W * 0.1, g, H);
    this.lamp(ctx, W * 0.92, g, H);
    // 発電機と備蓄庫がゲート脇に
    this.propGen(ctx, W * 0.3, g);
    this.propCrate(ctx, W * 0.68, g);
    // 路面
    var road = linGrad(ctx, 0, g, 0, H);
    road.addColorStop(0, '#43444c'); road.addColorStop(1, '#22232a');
    ctx.fillStyle = road; ctx.fillRect(0, g, W, H - g);
    ctx.fillStyle = 'rgba(255,220,160,0.06)';
    for (var k = 0; k < 5; k++) ctx.fillRect((k * 0.22 + 0.03) * W, g + 6 + k * 5, W * 0.13, 2);
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.fillRect(0, g, W, 2);
    // 小雨
    ctx.strokeStyle = 'rgba(200,200,230,0.14)'; ctx.lineWidth = 1;
    ctx.beginPath();
    for (var j = 0; j < this.rain.length; j++) {
      var r = this.rain[j];
      var rx = fin(r.x) * W, ry = fin(r.y) * H;
      ctx.moveTo(rx, ry); ctx.lineTo(rx - 2, ry + 9 * r.s);
    }
    ctx.stroke();
  };

  // 第2戦: 地下シェルターの洞窟区画（ランタンの灯り）
  Game.prototype.bgCave = function (ctx, W, H, g) {
    var sky = linGrad(ctx, 0, 0, 0, g);
    sky.addColorStop(0, '#0c0a12'); sky.addColorStop(1, '#241c26');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, g);
    // 岩盤アーチ
    ctx.fillStyle = '#2e2836';
    var arcs = [[0.12, 0.5], [0.4, 0.62], [0.7, 0.52], [0.95, 0.6]];
    for (var i = 0; i < arcs.length; i++) {
      ctx.beginPath();
      ctx.arc(fin(arcs[i][0] * W), g, fin(arcs[i][1] * H * 0.5) + 40, Math.PI, 0);
      ctx.fill();
    }
    ctx.fillStyle = '#241e2c';
    ctx.fillRect(0, 0, W, H * 0.1);
    // ランタン
    this.propLantern(ctx, W * 0.16, g - H * 0.26, H);
    this.propLantern(ctx, W * 0.5, g - H * 0.34, H);
    this.propLantern(ctx, W * 0.85, g - H * 0.24, H);
    // 造水機・栽培棚・備蓄庫
    this.propWater(ctx, W * 0.28, g);
    this.propFarm(ctx, W * 0.72, g);
    this.propCrate(ctx, W * 0.08, g);
    // 地面（掘り出した土）
    var road = linGrad(ctx, 0, g, 0, H);
    road.addColorStop(0, '#4a3c30'); road.addColorStop(1, '#241c14');
    ctx.fillStyle = road; ctx.fillRect(0, g, W, H - g);
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    for (var k = 0; k < 6; k++) ctx.fillRect((k * 0.18 + 0.05) * W, g + 8 + (k % 3) * 6, 26, 3);
  };

  // 最終戦: 聖域の扉（装甲壁と巨大ハッチ・非常灯）
  Game.prototype.bgVault = function (ctx, W, H, g) {
    ctx.fillStyle = '#3a3e48'; ctx.fillRect(0, 0, W, g);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 2;
    for (var i = 1; i < 6; i++) { ctx.beginPath(); ctx.moveTo(W * i / 6, 0); ctx.lineTo(W * i / 6, g); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(0, g * 0.45); ctx.lineTo(W, g * 0.45); ctx.stroke();
    // 巨大な円形ハッチ（聖域の扉）
    var cx = W * 0.5, cy = g - H * 0.19, R = Math.min(W, H) * 0.19;
    ctx.fillStyle = '#5a5e68'; ctx.beginPath(); ctx.arc(fin(cx), fin(cy), fin(R) + 14, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#7a7e88'; ctx.beginPath(); ctx.arc(fin(cx), fin(cy), fin(R), 0, 6.29); ctx.fill();
    ctx.strokeStyle = '#4a4e58'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(fin(cx), fin(cy), fin(R) * 0.62, 0, 6.29); ctx.stroke();
    for (var b = 0; b < 8; b++) {
      var ang = b * 0.785;
      ctx.fillStyle = '#31343c';
      ctx.beginPath(); ctx.arc(fin(cx + Math.cos(ang) * (R - 9)), fin(cy + Math.sin(ang) * (R - 9)), 4, 0, 6.29); ctx.fill();
    }
    ctx.fillStyle = '#ffd45e'; ctx.fillRect(fin(cx) - 10, fin(cy) - 5, 20, 10);
    // 非常灯の赤い明滅
    var pulse = 0.1 + 0.08 * Math.abs(Math.sin(fin(this.frame, 0) * 0.05));
    ctx.fillStyle = 'rgba(255,60,60,' + pulse.toFixed(2) + ')';
    ctx.fillRect(0, 0, W, g);
    var lampL = radGrad(ctx, W * 0.12, H * 0.12, 2, W * 0.12, H * 0.12, 60);
    lampL.addColorStop(0, 'rgba(255,80,80,0.7)'); lampL.addColorStop(1, 'rgba(255,80,80,0)');
    ctx.fillStyle = lampL; ctx.beginPath(); ctx.arc(W * 0.12, H * 0.12, 60, 0, 6.29); ctx.fill();
    var lampR = radGrad(ctx, W * 0.88, H * 0.12, 2, W * 0.88, H * 0.12, 60);
    lampR.addColorStop(0, 'rgba(255,80,80,0.7)'); lampR.addColorStop(1, 'rgba(255,80,80,0)');
    ctx.fillStyle = lampR; ctx.beginPath(); ctx.arc(W * 0.88, H * 0.12, 60, 0, 6.29); ctx.fill();
    // 発電機×2
    this.propGen(ctx, W * 0.14, g);
    this.propGen(ctx, W * 0.86, g);
    // 金属床
    var road = linGrad(ctx, 0, g, 0, H);
    road.addColorStop(0, '#3c4048'); road.addColorStop(1, '#1c1e24');
    ctx.fillStyle = road; ctx.fillRect(0, g, W, H - g);
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    for (var k = 0; k < 8; k++) ctx.fillRect(k * W / 8, g, 2, H - g);
    ctx.fillStyle = 'rgba(255,212,94,0.1)'; ctx.fillRect(0, g, W, 3);
  };

  // ---- シェルター設備の小物 ----
  Game.prototype.propGen = function (ctx, x, g) { // 発電機
    x = fin(x); g = fin(g);
    ctx.fillStyle = '#c9a02e'; ctx.fillRect(x - 22, g - 30, 44, 30);
    ctx.fillStyle = '#2a2a2a';
    for (var i = 0; i < 4; i++) ctx.fillRect(x - 22 + i * 12, g - 8, 7, 8);
    ctx.fillStyle = '#ffe084'; ctx.fillRect(x - 16, g - 24, 10, 6);
    ctx.fillStyle = '#8a6a14'; ctx.fillRect(x - 22, g - 32, 44, 3);
  };
  Game.prototype.propCrate = function (ctx, x, g) { // 備蓄庫
    x = fin(x); g = fin(g);
    ctx.fillStyle = '#8a6a44'; ctx.fillRect(x - 18, g - 34, 36, 34);
    ctx.strokeStyle = '#5c4428'; ctx.lineWidth = 3;
    ctx.strokeRect(x - 18, g - 34, 36, 34);
    ctx.beginPath(); ctx.moveTo(x - 18, g - 34); ctx.lineTo(x + 18, g);
    ctx.moveTo(x + 18, g - 34); ctx.lineTo(x - 18, g); ctx.stroke();
  };
  Game.prototype.propWater = function (ctx, x, g) { // 造水機
    x = fin(x); g = fin(g);
    ctx.fillStyle = '#2a86ac'; ctx.fillRect(x - 14, g - 44, 28, 44);
    ctx.fillStyle = '#54bce4'; ctx.fillRect(x - 10, g - 38, 20, 22);
    ctx.fillStyle = '#eafaff';
    ctx.beginPath(); ctx.arc(x, g - 28, 5, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#1a5a76'; ctx.fillRect(x - 14, g - 47, 28, 3);
  };
  Game.prototype.propFarm = function (ctx, x, g) { // 栽培棚
    x = fin(x); g = fin(g);
    ctx.fillStyle = '#5c4228'; ctx.fillRect(x - 24, g - 48, 48, 48);
    for (var row = 0; row < 3; row++) {
      var y = g - 40 + row * 15;
      ctx.fillStyle = '#3a2a18'; ctx.fillRect(x - 22, y + 8, 44, 3);
      ctx.fillStyle = '#5ec84e';
      for (var i = 0; i < 4; i++) ctx.fillRect(x - 19 + i * 11, y, 6, 8);
      ctx.fillStyle = 'rgba(200,255,220,0.25)';
      ctx.fillRect(x - 22, y - 2, 44, 2);
    }
  };
  Game.prototype.propLantern = function (ctx, x, y, H) { // 作業ランタン
    x = fin(x); y = fin(y);
    var glow = radGrad(ctx, x, y, 3, x, y, H * 0.22);
    glow.addColorStop(0, 'rgba(255,212,94,0.5)');
    glow.addColorStop(1, 'rgba(255,212,94,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(x, y, H * 0.22, 0, 6.29); ctx.fill();
    ctx.fillStyle = '#3a3428'; ctx.fillRect(x - 7, y - 9, 14, 18);
    ctx.fillStyle = '#ffd45e'; ctx.fillRect(x - 4, y - 5, 8, 10);
    ctx.fillStyle = '#3a3428'; ctx.fillRect(x - 2, y - 13, 4, 4);
  };

  Game.prototype.buildings = function (ctx, W, H, g) {
    ctx.fillStyle = '#0e1120';
    var bw = W / 6;
    for (var i = 0; i < 7; i++) {
      var h = (0.32 + ((i * 37) % 23) / 60) * g;
      ctx.fillRect(i * bw - 6, g - h, bw - 8, h);
      // lit windows (deterministic)
      for (var wy = 0; wy < 6; wy++) for (var wx = 0; wx < 3; wx++) {
        if (((i * 7 + wy * 3 + wx) % 5) < 2) {
          ctx.fillStyle = ((i + wx + wy) % 3 === 0) ? 'rgba(255,210,130,0.5)' : 'rgba(140,190,255,0.28)';
          ctx.fillRect(i * bw + 6 + wx * (bw - 30) / 3, g - h + 12 + wy * (h - 24) / 6, 7, 9);
          ctx.fillStyle = '#0e1120';
        }
      }
    }
    // neon sign
    ctx.fillStyle = 'rgba(255,60,120,0.85)';
    ctx.font = 'bold 13px monospace'; ctx.textAlign = 'left';
    ctx.fillText('BAR', W * 0.055, g - H * 0.24);
    ctx.fillStyle = 'rgba(60,220,255,0.8)';
    ctx.fillText('ラーメン', W * 0.62, g - H * 0.3);
  };

  Game.prototype.lamp = function (ctx, x, g, H) {
    x = fin(x); g = fin(g);
    ctx.fillStyle = '#101216';
    ctx.fillRect(x - 3, g - H * 0.5, 6, H * 0.5);
    ctx.fillRect(x - 16, g - H * 0.5, 32, 6);
    var cone = radGrad(ctx, x, g - H * 0.48, 2, x, g - H * 0.1, H * 0.45);
    cone.addColorStop(0, 'rgba(255,224,150,0.34)'); cone.addColorStop(1, 'rgba(255,224,150,0)');
    ctx.fillStyle = cone;
    ctx.beginPath();
    ctx.moveTo(x - 6, g - H * 0.48);
    ctx.lineTo(x + 6, g - H * 0.48);
    ctx.lineTo(x + H * 0.22, g + 4);
    ctx.lineTo(x - H * 0.22, g + 4);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#ffe9b0'; ctx.fillRect(x - 8, g - H * 0.5 + 4, 16, 5);
  };

  Game.prototype.shadow = function (ctx, f) {
    var down = (f.state === 'down' || f.state === 'ko');
    var w = down ? 58 : 26, y = this.groundY + 5;
    var grad = radGrad(ctx, f.x, y, 1, f.x, y, w);
    grad.addColorStop(0, 'rgba(0,0,0,0.5)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.ellipse(fin(f.x), fin(y), w, 8, 0, 0, 6.29); ctx.fill();
  };

  // ---------- articulated fighter ----------
  Game.prototype.pose = function (f) {
    // returns joint angles & offsets; all finite by construction
    var t = fin(f.t), br = Math.sin(fin(f.breath)) * 2;
    var p = {
      hipY: 0, lean: 0, headBob: br * 0.6, crouch: 0,
      // arm angles [shoulder, elbow] relative; lead = facing side
      leadArm: [-0.5, -1.9], rearArm: [-0.9, -2.0],
      leadLeg: [0.10, 0.12], rearLeg: [-0.12, 0.10],
      lying: 0, faceDown: false
    };
    var s;
    switch (f.state) {
      case 'walk':
        s = Math.sin(t * 0.22);
        p.leadLeg = [0.35 * s + 0.05, 0.25 - 0.2 * s];
        p.rearLeg = [-0.35 * s - 0.05, 0.25 + 0.2 * s];
        p.leadArm = [-0.5 - 0.15 * s, -1.8]; p.rearArm = [-0.9 + 0.15 * s, -1.9];
        p.hipY = Math.abs(s) * 2.4; p.lean = 0.05;
        break;
      case 'block':
        p.leadArm = [-1.7, -2.4]; p.rearArm = [-1.9, -2.5];
        p.crouch = 6; p.lean = 0.12; p.headBob = br * 0.3;
        break;
      case 'attack': {
        var atk = ATTACKS[f.attack] || ATTACKS.jab;
        var total = atk.windup + atk.active + atk.recover;
        var ph = clamp(t / total, 0, 1);
        var ext = t < atk.windup ? ease(t / atk.windup) * -0.35
                : t < atk.windup + atk.active ? easeOut((t - atk.windup) / atk.active)
                : 1 - ease((t - atk.windup - atk.active) / atk.recover);
        if (f.attack === 'jab') {
          p.leadArm = [lerp(-0.5, -1.55, Math.max(0, ext)), lerp(-1.9, -0.05, Math.max(0, ext))];
          p.lean = 0.10 + ext * 0.12;
        } else if (f.attack === 'cross') {
          p.rearArm = [lerp(-0.9, -1.6, Math.max(0, ext)), lerp(-2.0, -0.02, Math.max(0, ext))];
          p.leadArm = [-1.3, -2.2];
          p.lean = 0.12 + ext * 0.22; p.hipY = ext * 2;
        } else if (f.attack === 'hook') {
          p.leadArm = [lerp(-0.4, -2.5, Math.max(0, ext)), lerp(-1.8, -1.1, Math.max(0, ext))];
          p.lean = 0.1 + ext * 0.18;
        } else if (f.attack === 'lowkick') {
          p.leadLeg = [lerp(0.1, -1.15, Math.max(0, ext)), lerp(0.12, 0.35, Math.max(0, ext))];
          p.lean = -0.12 * ext; p.crouch = 3;
          p.leadArm = [-1.2, -2.3]; p.rearArm = [-1.4, -2.4];
        } else if (f.attack === 'highkick') {
          p.leadLeg = [lerp(0.1, -1.95, Math.max(0, ext)), lerp(0.12, 0.08, Math.max(0, ext))];
          p.lean = -0.3 * ext; p.crouch = 2;
          p.leadArm = [-1.3, -2.3]; p.rearArm = [-0.6, -1.6];
        } else if (f.attack === 'wave') {
          // 烈気掌: 両掌を前へ突き出す
          var w = Math.max(0, ext);
          p.leadArm = [lerp(-0.4, -1.55, w), lerp(-1.6, -0.05, w)];
          p.rearArm = [lerp(-1.0, -1.45, w), lerp(-2.0, -0.1, w)];
          p.lean = 0.05 + w * 0.2; p.crouch = 5 * w; p.hipY = w * 2;
        } else if (f.attack === 'flurry') {
          // 旋風連脚: 高速の連続蹴り
          var kick = Math.sin(t * 0.9);
          p.leadLeg = [-1.2 + kick * 0.7, 0.2];
          p.rearLeg = [-0.1 - kick * 0.2, 0.15];
          p.lean = -0.15; p.crouch = 2;
          p.leadArm = [-1.4, -2.3]; p.rearArm = [-0.5, -1.4];
          p.hipY = Math.abs(kick) * 2;
        } else if (f.attack === 'dash') {
          // 弾丸ブロー: 低い姿勢からの突進ストレート
          p.rearArm = [lerp(-0.9, -1.6, Math.max(0, ext)), lerp(-2.0, -0.02, Math.max(0, ext))];
          p.leadArm = [-1.5, -2.4];
          p.lean = 0.28 + ext * 0.2; p.crouch = 8; p.hipY = 2;
        } else if (f.attack === 'lariat') {
          // 豪腕ハリケーン: 両腕を広げて回転
          var spin = t * 0.55;
          p.leadArm = [-1.57 + Math.sin(spin) * 0.4, -0.15];
          p.rearArm = [-1.57 - Math.sin(spin) * 0.4, -0.15];
          p.lean = Math.sin(spin) * 0.12; p.hipY = Math.abs(Math.sin(spin)) * 2;
        }
        break;
      }
      case 'hit':
        s = clamp(f.hitT / 20, 0, 1);
        p.lean = -0.32 * s; p.headBob = -3 * s; p.crouch = 4 * s;
        p.leadArm = [-0.8, -2.2]; p.rearArm = [-1.0, -2.3];
        break;
      case 'down':
        p.lying = clamp(t / 12, 0, 1); p.faceDown = false;
        break;
      case 'getup':
        p.lying = 1 - clamp(t / 40, 0, 1); p.crouch = 10 * (1 - p.lying);
        break;
      case 'ko':
        p.lying = clamp(t / 14, 0, 1); p.faceDown = true;
        break;
      case 'win':
        s = Math.sin(t * 0.1);
        p.leadArm = [-2.6 + 0.1 * s, -2.8]; p.rearArm = [-0.8, -2.0];
        break;
    }
    // fatigue wobble
    p.lean += Math.sin(fin(f.breath) * 1.7) * 0.02 * (1 - f.stam / f.maxStam) + f.stagger * Math.sin(t * 0.5) * 0.03;
    return p;
  };

  function limb(ctx, x0, y0, a1, l1, a2, l2, w, color) {
    // two-segment limb; angles absolute-ish (relative to down)
    x0 = fin(x0); y0 = fin(y0);
    var x1 = x0 + Math.sin(fin(a1)) * l1, y1 = y0 + Math.cos(fin(a1)) * l1;
    var x2 = x1 + Math.sin(fin(a1) + fin(a2)) * l2, y2 = y1 + Math.cos(fin(a1) + fin(a2)) * l2;
    ctx.strokeStyle = color; ctx.lineWidth = w; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    return [x2, y2];
  }

  Game.prototype.drawFighter = function (ctx, f) {
    var g = this.groundY, p = this.pose(f), dir = f.facing;
    var x = fin(f.x);
    ctx.save();

    if (p.lying > 0.02) {
      // lying on the ground
      var ly = lerp(0, 1, p.lying);
      ctx.translate(x, g - 10 + ly * 2);
      ctx.scale(fin(f.scale, 1), fin(f.scale, 1));
      ctx.rotate(dir * lerp(0, p.faceDown ? 1.5 : -1.5, ly) * -1);
      this.body(ctx, f, p, dir, ly);
      ctx.restore();
      return;
    }
    ctx.translate(x, g);
    ctx.scale(fin(f.scale, 1), fin(f.scale, 1));
    this.body(ctx, f, p, dir, 0);
    ctx.restore();
  };

  Game.prototype.body = function (ctx, f, p, dir, lying) {
    // proportions
    var hipH = 52 - p.crouch, torso = 44, headR = 11;
    var hipY = -hipH - p.hipY + lying * 40;
    var lean = fin(p.lean) * dir;
    var chestX = Math.sin(lean) * torso * dir * 0 + Math.sin(lean) * torso;
    var chestY = hipY - Math.cos(lean) * torso;
    var chest = [chestX, chestY];
    var hip = [0, hipY];

    var skin = f.skin, shirt = f.shirt, pants = f.pants;
    var armCol = (f.outfit === 'tank' || f.outfit === 'wrestler') ? skin : shirt;
    var torsoCol = f.outfit === 'wrestler' ? skin : shirt;
    var hurt = clamp(f.hurtFlash, 0, 1);

    // legs (rear first)
    var rl = p.rearLeg, ll = p.leadLeg;
    var legW = f.outfit === 'gi' || f.outfit === 'kungfu' ? 13 : 11; // ゆったりした袴・拳法ズボン
    limb(ctx, hip[0] - dir * 5, hip[1], dir * rl[0] + 0.06, 28, dir * rl[1], 26 - lying * 6, legW, pants);
    // rear arm behind torso
    var ra = p.rearArm;
    var rHand = limb(ctx, chest[0] - dir * 8, chest[1] + 6, dir * ra[0], 22, dir * ra[1], 20, 8, armCol);
    this.fist(ctx, rHand, skin, 5);

    // torso
    var tg = linGrad(ctx, chest[0], chest[1], hip[0], hip[1]);
    tg.addColorStop(0, torsoCol); tg.addColorStop(1, shade(torsoCol, -18));
    ctx.strokeStyle = tg; ctx.lineWidth = f.outfit === 'wrestler' ? 24 : 20; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(hip[0], hip[1]); ctx.lineTo(chest[0], chest[1]); ctx.stroke();
    // sweat sheen
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(hip[0] - dir * 4, hip[1] - 4); ctx.lineTo(chest[0] - dir * 4, chest[1] + 4); ctx.stroke();

    // 衣装ディテール（胴まわり）
    if (f.outfit === 'gi') {
      // 帯
      ctx.fillStyle = '#1a1a1a';
      ctx.fillRect(fin(hip[0]) - 12, fin(hip[1]) - 4, 24, 6);
      ctx.fillRect(fin(hip[0]) + dir * 4 - 2, fin(hip[1]) + 1, 4, 10);
    } else if (f.outfit === 'kungfu') {
      // 飾り帯
      ctx.fillStyle = '#e8d8a0';
      ctx.fillRect(fin(hip[0]) - 12, fin(hip[1]) - 4, 24, 5);
    } else if (f.outfit === 'wrestler') {
      // シングレットの肩紐
      ctx.strokeStyle = shirt; ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(fin(chest[0]) - 7, fin(chest[1]) - 2); ctx.lineTo(fin(hip[0]) - 5, fin(hip[1]) - 8);
      ctx.moveTo(fin(chest[0]) + 7, fin(chest[1]) - 2); ctx.lineTo(fin(hip[0]) + 5, fin(hip[1]) - 8);
      ctx.stroke();
    } else if (f.outfit === 'tank') {
      // ドッグタグ
      ctx.fillStyle = '#c8ced8';
      ctx.fillRect(fin(chest[0]) - 1.5, fin(chest[1]) + 7, 3, 5);
    }

    // lead leg (in front)
    limb(ctx, hip[0] + dir * 5, hip[1], dir * ll[0], 28, dir * ll[1], 26 - lying * 6, legW, shade(pants, 10));

    // head
    var hx = chest[0] + Math.sin(lean) * 14 + dir * 3;
    var hy = chest[1] - 14 + fin(p.headBob) - Math.cos(lean) * 4;
    ctx.fillStyle = hurt > 0.3 ? mix(skin, '#ff5540', hurt * 0.5) : skin;
    ctx.beginPath(); ctx.arc(fin(hx), fin(hy), headR, 0, 6.29); ctx.fill();
    // hair / 頭部スタイル
    if (f.outfit === 'wrestler') {
      // スキンヘッド＋ひげ
      ctx.fillStyle = f.hair;
      ctx.beginPath(); ctx.arc(fin(hx) + dir * 1, fin(hy) + 4.5, headR * 0.72, 0, Math.PI); ctx.fill();
    } else if (f.outfit === 'tank') {
      // 刈り上げ＋ベレー帽
      ctx.fillStyle = f.hair;
      ctx.fillRect(fin(hx) - headR + 1, fin(hy) - headR + 1, headR * 2 - 2, 4);
      ctx.fillStyle = shade(shirt, -14);
      ctx.fillRect(fin(hx) - headR - 1, fin(hy) - headR - 2, headR * 2 + 2, 5);
      ctx.fillRect(fin(hx) - dir * 2, fin(hy) - headR - 5, dir * 7, 4);
    } else {
      ctx.fillStyle = f.hair;
      ctx.beginPath(); ctx.arc(fin(hx) - dir * 1.5, fin(hy) - 3.5, headR - 1.2, Math.PI * (dir > 0 ? 0.95 : 0.05), Math.PI * (dir > 0 ? 1.95 : 1.05), false); ctx.fill();
    }
    if (f.outfit === 'kungfu') {
      // ポニーテール（呼吸で揺れる）
      var sway = Math.sin(fin(f.breath) * 1.4) * 2;
      ctx.strokeStyle = f.hair; ctx.lineWidth = 4; ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(fin(hx) - dir * (headR - 2), fin(hy) - 4);
      ctx.lineTo(fin(hx) - dir * (headR + 5) + sway, fin(hy) + 4);
      ctx.lineTo(fin(hx) - dir * (headR + 7) + sway * 1.5, fin(hy) + 13);
      ctx.stroke();
    }
    if (f.outfit === 'gi' && f.band) {
      // ハチマキ＋なびく結び
      ctx.fillStyle = f.band;
      ctx.fillRect(fin(hx) - headR, fin(hy) - 5, headR * 2, 4);
      var wv = Math.sin(fin(f.breath) * 2) * 2;
      ctx.fillRect(fin(hx) - dir * (headR + 1) - (dir > 0 ? 7 : 0), fin(hy) - 4 + wv, 7, 3);
    }
    // face: eye + bruise
    ctx.fillStyle = '#181410';
    ctx.fillRect(fin(hx) + dir * 4 - 1, fin(hy) - 2, 2.4, 2.6);
    if (f.bruise > 0.15) {
      ctx.fillStyle = 'rgba(140,30,50,' + (0.25 + f.bruise * 0.4).toFixed(2) + ')';
      ctx.beginPath(); ctx.arc(fin(hx) + dir * 5, fin(hy) + 3, 3.4, 0, 6.29); ctx.fill();
    }

    // lead arm (in front)
    var la = p.leadArm;
    var lHand = limb(ctx, chest[0] + dir * 8, chest[1] + 5, dir * la[0], 22, dir * la[1], 20, 8, shade(armCol, 12));
    this.fist(ctx, lHand, skin, 5.5);

    // attack trail
    if (f.state === 'attack') {
      var atk = ATTACKS[f.attack];
      if (f.t >= atk.windup && f.t <= atk.windup + atk.active + 3) {
        ctx.strokeStyle = 'rgba(255,255,255,0.20)'; ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(fin(chest[0]), fin(chest[1] + 6), atk.reach * 0.62,
                dir > 0 ? -0.7 : Math.PI - 0.5, dir > 0 ? 0.5 : Math.PI + 0.7);
        ctx.stroke();
      }
    }
  };

  Game.prototype.fist = function (ctx, pos, skin, r) {
    ctx.fillStyle = skin;
    ctx.beginPath(); ctx.arc(fin(pos[0]), fin(pos[1]), r, 0, 6.29); ctx.fill();
  };

  function shade(hex, amt) {
    var n = parseInt(hex.slice(1), 16);
    if (!isFinite(n)) return hex;
    var r = clamp(((n >> 16) & 255) + amt, 0, 255),
        gg = clamp(((n >> 8) & 255) + amt, 0, 255),
        b = clamp((n & 255) + amt, 0, 255);
    return 'rgb(' + (r | 0) + ',' + (gg | 0) + ',' + (b | 0) + ')';
  }
  function mix(hex, hex2, t) {
    var a = parseInt(hex.slice(1), 16), b = parseInt(hex2.slice(1), 16);
    if (!isFinite(a) || !isFinite(b)) return hex;
    t = clamp(t, 0, 1);
    var r = ((a >> 16) & 255) * (1 - t) + ((b >> 16) & 255) * t;
    var gch = ((a >> 8) & 255) * (1 - t) + ((b >> 8) & 255) * t;
    var bl = (a & 255) * (1 - t) + (b & 255) * t;
    return 'rgb(' + (r | 0) + ',' + (gch | 0) + ',' + (bl | 0) + ')';
  }

  Game.prototype.drawProjs = function (ctx) {
    for (var i = 0; i < this.projectiles.length; i++) {
      var p = this.projectiles[i];
      var x = fin(p.x), y = fin(this.groundY - 100 + Math.sin(fin(p.pulse)) * 3);
      var glow = radGrad(ctx, x, y, 2, x, y, 26);
      glow.addColorStop(0, 'rgba(150,225,255,0.9)');
      glow.addColorStop(0.5, 'rgba(80,160,255,0.45)');
      glow.addColorStop(1, 'rgba(80,160,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(x, y, 26, 0, 6.29); ctx.fill();
      ctx.fillStyle = 'rgba(235,250,255,0.95)';
      ctx.beginPath(); ctx.arc(x, y, 7 + Math.sin(fin(p.pulse) * 2) * 1.5, 0, 6.29); ctx.fill();
      // 尾を引く
      ctx.fillStyle = 'rgba(120,200,255,0.3)';
      var tail = p.vx > 0 ? -1 : 1;
      ctx.beginPath(); ctx.ellipse(x + tail * 18, y, 14, 5, 0, 0, 6.29); ctx.fill();
    }
  };

  Game.prototype.drawParticles = function (ctx) {
    var L = this.particles.list;
    for (var i = 0; i < L.length; i++) {
      var p = L[i], a = clamp(1 - p.t / p.life, 0, 1);
      if (p.kind === 'blood') ctx.fillStyle = 'rgba(190,30,40,' + (a * 0.9).toFixed(2) + ')';
      else if (p.kind === 'sweat') ctx.fillStyle = 'rgba(210,225,255,' + (a * 0.8).toFixed(2) + ')';
      else if (p.kind === 'spark') ctx.fillStyle = 'rgba(255,230,140,' + (a * 0.9).toFixed(2) + ')';
      else ctx.fillStyle = 'rgba(150,140,130,' + (a * 0.4).toFixed(2) + ')';
      ctx.beginPath(); ctx.arc(fin(p.x), fin(p.y), Math.max(0.1, fin(p.r) * a), 0, 6.29); ctx.fill();
    }
  };

  Game.prototype.hud = function (ctx, W, H) {
    var pad = 14, barW = W * 0.38, barH = 13, y = 16;
    this.bar(ctx, pad, y, barW, barH, this.p1.hp / this.p1.maxHp, '#e33', false, this.p1.dispName + '（' + this.p1.sub + '）');
    this.bar(ctx, W - pad - barW, y, barW, barH, this.p2.hp / this.p2.maxHp, '#e33', true, this.p2.dispName + '（' + this.p2.sub + '）');
    this.bar(ctx, pad, y + 19, barW * 0.7, 6, this.p1.stam / this.p1.maxStam, '#3ac06a', false, null);
    this.bar(ctx, W - pad - barW * 0.7, y + 19, barW * 0.7, 6, this.p2.stam / this.p2.maxStam, '#3ac06a', true, null);

    // timer
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(W / 2 - 26, 8, 52, 30);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px monospace'; ctx.textAlign = 'center';
    ctx.fillText(String(Math.ceil(fin(this.timer, 0))), W / 2, 31);

    // round pips
    for (var i = 0; i < 2; i++) {
      ctx.fillStyle = i < this.wins1 ? '#ffd34d' : 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(pad + 10 + i * 16, y + 38, 5, 0, 6.29); ctx.fill();
      ctx.fillStyle = i < this.wins2 ? '#ffd34d' : 'rgba(255,255,255,0.2)';
      ctx.beginPath(); ctx.arc(W - pad - 10 - i * 16, y + 38, 5, 0, 6.29); ctx.fill();
    }

    // combo
    if (this.p1.combo > 1 && this.p1.comboT > 0) {
      ctx.fillStyle = '#ffd34d'; ctx.font = 'bold 17px monospace'; ctx.textAlign = 'left';
      ctx.fillText(this.p1.combo + ' HITS', pad, y + 62);
    }

    // center message
    if (this.msgT > 0 && this.msg) {
      var alpha = this.phase === 'matchend' ? 1 : clamp(this.msgT, 0, 1);
      ctx.fillStyle = 'rgba(0,0,0,' + (0.35 * alpha).toFixed(2) + ')';
      ctx.fillRect(0, H * 0.34, W, 56);
      ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
      ctx.font = 'bold ' + Math.max(10, Math.round(H * 0.085)) + 'px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(this.msg, W / 2, H * 0.34 + 40);
      if (this.msgSub) {
        ctx.font = 'bold 12px monospace';
        ctx.fillStyle = 'rgba(255,220,150,' + alpha.toFixed(2) + ')';
        ctx.fillText(this.msgSub, W / 2, H * 0.34 + 62);
      }
      if (this.phase === 'matchend') {
        ctx.font = 'bold 13px monospace';
        ctx.fillStyle = 'rgba(255,255,255,' + alpha.toFixed(2) + ')';
        ctx.fillText('PUNCH TO REMATCH / パンチで再戦', W / 2, H * 0.34 + 86);
      }
    }
  };

  Game.prototype.bar = function (ctx, x, y, w, h, v, color, flip, label) {
    x = fin(x); y = fin(y); w = Math.max(1, fin(w, 1)); h = Math.max(1, fin(h, 1));
    v = clamp(v, 0, 1);
    ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(x - 2, y - 2, w + 4, h + 4);
    var gg = linGrad(ctx, x, y, x, y + h);
    gg.addColorStop(0, color); gg.addColorStop(1, shade(color.length === 4 ? expandHex(color) : color, -40));
    ctx.fillStyle = gg;
    var fw = w * v;
    ctx.fillRect(flip ? x + w - fw : x, y, fw, h);
    if (label) {
      ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = 'bold 10px monospace';
      ctx.textAlign = flip ? 'right' : 'left';
      ctx.fillText(label, flip ? x + w : x, y - 5);
    }
  };
  function expandHex(h) { return '#' + h[1] + h[1] + h[2] + h[2] + h[3] + h[3]; }

  return { Game: Game, Fighter: Fighter, ATTACKS: ATTACKS, STYLES: STYLES, STYLE_KEYS: STYLE_KEYS, fin: fin, clamp: clamp, setSeed: setSeed };
});

</script>
<script>
(function () {
  'use strict';
  var fin = StreetFight.fin;
  var STYLES = StreetFight.STYLES, KEYS4 = StreetFight.STYLE_KEYS;
  var canvas = document.getElementById('cv');
  var ctx = canvas.getContext('2d');
  var game = null;

  function resize() {
    var dpr = Math.min(2, Math.max(1, fin(window.devicePixelRatio, 1)));
    var w = Math.max(80, fin(window.innerWidth, 800));
    var h = Math.max(60, fin(window.innerHeight, 450));
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (game) game.resize(w, h);
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', function () { setTimeout(resize, 250); });

  // ---- キャラ選択画面（各スタイルの簡易バスト絵を描画） ----
  function portrait(cv2, key) {
    var s = STYLES[key];
    var c = cv2.getContext('2d');
    cv2.width = 96; cv2.height = 110;
    var bg = c.createLinearGradient(0, 0, 0, 110);
    bg.addColorStop(0, '#232b42'); bg.addColorStop(1, '#10131e');
    c.fillStyle = bg; c.fillRect(0, 0, 96, 110);
    var cx = 48, cy = 44, r = key === 'gordo' ? 20 : 17;
    // 胴体
    c.fillStyle = key === 'gordo' ? s.skin : s.top;
    c.beginPath(); c.ellipse(cx, 108, key === 'gordo' ? 36 : 28, 42, 0, Math.PI, 0); c.fill();
    if (key === 'gordo') { // シングレット肩紐
      c.strokeStyle = s.top; c.lineWidth = 7;
      c.beginPath(); c.moveTo(cx - 12, 78); c.lineTo(cx - 18, 108);
      c.moveTo(cx + 12, 78); c.lineTo(cx + 18, 108); c.stroke();
    }
    if (key === 'bird') { c.fillStyle = '#c8ced8'; c.fillRect(cx - 2, 84, 4, 8); } // タグ
    // 頭
    c.fillStyle = s.skin;
    c.beginPath(); c.arc(cx, cy, r, 0, 6.29); c.fill();
    // 髪・被り物
    if (key === 'takeru') {
      c.fillStyle = s.hair; c.beginPath(); c.arc(cx, cy - 5, r - 1, Math.PI, 0); c.fill();
      c.fillStyle = s.band; c.fillRect(cx - r, cy - 7, r * 2, 6);
      c.fillRect(cx + r - 2, cy - 5, 10, 4);
    } else if (key === 'meifa') {
      c.fillStyle = s.hair; c.beginPath(); c.arc(cx, cy - 4, r - 1, Math.PI * 0.95, Math.PI * 0.05); c.fill();
      c.strokeStyle = s.hair; c.lineWidth = 6; c.lineCap = 'round';
      c.beginPath(); c.moveTo(cx - r + 3, cy); c.quadraticCurveTo(cx - r - 8, cy + 14, cx - r - 4, cy + 30); c.stroke();
    } else if (key === 'bird') {
      c.fillStyle = s.hair; c.fillRect(cx - r + 2, cy - r + 3, r * 2 - 4, 5);
      c.fillStyle = '#3a4032'; c.fillRect(cx - r - 2, cy - r - 1, r * 2 + 4, 7);
      c.fillRect(cx + 2, cy - r - 5, 12, 5);
    } else {
      c.fillStyle = s.hair; c.beginPath(); c.arc(cx, cy + 8, r * 0.75, 0, Math.PI); c.fill();
    }
    // 目
    c.fillStyle = '#181410';
    c.fillRect(cx - 7, cy - 2, 4, 4); c.fillRect(cx + 3, cy - 2, 4, 4);
  }

  var selEl = document.getElementById('select');
  var cardsEl = document.getElementById('cards');
  KEYS4.forEach(function (key) {
    var s = STYLES[key];
    var card = document.createElement('div');
    card.className = 'card';
    var pc = document.createElement('canvas');
    card.appendChild(pc);
    var nm = document.createElement('div'); nm.className = 'nm'; nm.textContent = s.name;
    var st = document.createElement('div'); st.className = 'st'; st.textContent = s.sub;
    var sp = document.createElement('div'); sp.className = 'sp'; sp.textContent = '必殺: ' + s.specialName;
    card.appendChild(nm); card.appendChild(st); card.appendChild(sp);
    portrait(pc, key);
    card.addEventListener('click', function () { startGame(key); });
    cardsEl.appendChild(card);
  });

  function startGame(playerKey) {
    var others = KEYS4.filter(function (k) { return k !== playerKey; });
    var aiKey = others[Math.floor(Math.random() * others.length)];
    StreetFight.setSeed((Date.now() % 100000) || 1);
    game = new StreetFight.Game({ width: 800, height: 450, p1Style: playerKey, p2Style: aiKey });
    resize();
    selEl.style.display = 'none';
    document.getElementById('padL').style.display = '';
    document.getElementById('padR').style.display = '';
    var s = STYLES[playerKey];
    var hint = document.getElementById('hint');
    hint.textContent = '←→移動 / Z ジャブ・X ストレート・C フック / A ロー・S ハイ / D 必殺「' + s.specialName + '」 / ↓ガード';
    hint.style.opacity = '1';
    hintShown = true;
    document.getElementById('spBtn').lastChild.textContent = s.specialName;
    audio.unlock();
  }

  // ---- input ----
  var input = {};
  var edgeKeys = ['jab', 'cross', 'hook', 'lowkick', 'highkick', 'special'];
  var held = {};
  var KEYMAP = { ArrowLeft: 'left', ArrowRight: 'right', ArrowDown: 'block',
    z: 'jab', Z: 'jab', x: 'cross', X: 'cross', c: 'hook', C: 'hook',
    a: 'lowkick', A: 'lowkick', s: 'highkick', S: 'highkick',
    d: 'special', D: 'special', ' ': 'block' };
  window.addEventListener('keydown', function (e) {
    var k = KEYMAP[e.key]; if (!k) return;
    e.preventDefault();
    if (edgeKeys.indexOf(k) >= 0) { if (!held[k]) { input[k] = true; } held[k] = true; }
    else input[k] = true;
    audio.unlock();
  });
  window.addEventListener('keyup', function (e) {
    var k = KEYMAP[e.key]; if (!k) return;
    held[k] = false;
    if (edgeKeys.indexOf(k) < 0) input[k] = false;
  });

  Array.prototype.forEach.call(document.querySelectorAll('.btn'), function (btn) {
    var k = btn.getAttribute('data-k');
    function down(e) { e.preventDefault(); btn.classList.add('on');
      if (edgeKeys.indexOf(k) >= 0) { if (!held[k]) input[k] = true; held[k] = true; }
      else input[k] = true; audio.unlock(); }
    function up(e) { e.preventDefault(); btn.classList.remove('on');
      held[k] = false; if (edgeKeys.indexOf(k) < 0) input[k] = false; }
    btn.addEventListener('touchstart', down, { passive: false });
    btn.addEventListener('touchend', up, { passive: false });
    btn.addEventListener('touchcancel', up, { passive: false });
    btn.addEventListener('mousedown', down);
    btn.addEventListener('mouseup', up);
    btn.addEventListener('mouseleave', up);
  });

  // ---- synthesized audio ----
  var audio = {
    ctx: null,
    unlock: function () {
      if (!this.ctx) {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return; }
      }
      if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    },
    noise: function (dur, freq, q, gain) {
      if (!this.ctx || this.ctx.state !== 'running') return;
      var c = this.ctx, n = c.sampleRate * dur | 0;
      var buf = c.createBuffer(1, Math.max(1, n), c.sampleRate);
      var d = buf.getChannelData(0);
      for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
      var src = c.createBufferSource(); src.buffer = buf;
      var f = c.createBiquadFilter(); f.type = 'bandpass';
      f.frequency.value = freq; f.Q.value = q;
      var gg = c.createGain(); gg.gain.value = gain;
      src.connect(f); f.connect(gg); gg.connect(c.destination);
      src.start();
    },
    thud: function (f0, dur, gain) {
      if (!this.ctx || this.ctx.state !== 'running') return;
      var c = this.ctx, o = c.createOscillator(), gg = c.createGain();
      o.type = 'sine'; o.frequency.setValueAtTime(f0, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(Math.max(20, f0 * 0.3), c.currentTime + dur);
      gg.gain.setValueAtTime(gain, c.currentTime);
      gg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(gg); gg.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    },
    zap: function () {
      if (!this.ctx || this.ctx.state !== 'running') return;
      var c = this.ctx, o = c.createOscillator(), gg = c.createGain();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(220, c.currentTime);
      o.frequency.exponentialRampToValueAtTime(700, c.currentTime + 0.18);
      gg.gain.setValueAtTime(0.12, c.currentTime);
      gg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
      o.connect(gg); gg.connect(c.destination);
      o.start(); o.stop(c.currentTime + 0.3);
    },
    bell: function () {
      if (!this.ctx || this.ctx.state !== 'running') return;
      var c = this.ctx;
      [880, 1320].forEach(function (f, i) {
        var o = c.createOscillator(), gg = c.createGain();
        o.type = 'triangle'; o.frequency.value = f;
        gg.gain.setValueAtTime(0.12 / (i + 1), c.currentTime);
        gg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.9);
        o.connect(gg); gg.connect(c.destination);
        o.start(); o.stop(c.currentTime + 0.9);
      });
    },
    handle: function (ev) {
      switch (ev.name) {
        case 'swing': this.noise(0.09, 900, 1.2, 0.10); break;
        case 'special': this.zap(); this.noise(0.12, 700, 1.2, 0.12); break;
        case 'wave': this.zap(); break;
        case 'jab': this.thud(180, 0.09, 0.25); this.noise(0.05, 1800, 2, 0.08); break;
        case 'hit': this.thud(120, 0.16, 0.4); this.noise(0.08, 1400, 2, 0.12); break;
        case 'kick': this.thud(90, 0.2, 0.5); this.noise(0.1, 800, 1.5, 0.15); break;
        case 'block': this.noise(0.06, 2500, 3, 0.1); this.thud(300, 0.05, 0.12); break;
        case 'guardbreak': this.noise(0.2, 600, 1, 0.2); this.thud(70, 0.3, 0.4); break;
        case 'fall': this.thud(55, 0.35, 0.55); this.noise(0.18, 300, 1, 0.2); break;
        case 'ko': this.bell(); this.thud(50, 0.5, 0.6); break;
        case 'bell': this.bell(); break;
      }
    }
  };

  // ---- main loop ----
  var last = performance.now();
  var hintShown = false;
  function frame(now) {
    var dt = (now - last) / 1000; last = now;
    if (game) {
      game.update(dt, input);
      for (var i = 0; i < edgeKeys.length; i++) input[edgeKeys[i]] = false;
      var evs = game.drainEvents();
      for (var j = 0; j < evs.length; j++) audio.handle(evs[j]);
      if (hintShown && game.phase === 'fight' && game.phaseT > 5) {
        hintShown = false; document.getElementById('hint').style.opacity = '0';
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      game.render(ctx);
      // マッチ終了→再戦ではキャラ選択に戻る
      if (game.phase === 'matchend' && (input.jab || input.cross)) { /* handled in core */ }
    }
    requestAnimationFrame(frame);
  }
  resize();
  requestAnimationFrame(frame);

  // マッチ終了後、画面タップでキャラ選択に戻れるように
  canvas.addEventListener('click', function () {
    if (game && game.phase === 'matchend') {
      game = null;
      selEl.style.display = '';
      document.getElementById('padL').style.display = 'none';
      document.getElementById('padR').style.display = 'none';
    }
  });
})();
</script>
</body>
</html>
